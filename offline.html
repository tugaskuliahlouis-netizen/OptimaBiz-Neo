<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFC107" />
  <title>OptimaBiz — Offline</title>
  <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');

    :root {
      --yellow: #FFC107;
      --dark: #1A1A1A;
      --dark2: #242424;
      --card: #1e1e1e;
      --border: rgba(255,193,7,0.15);
      --text: #f0f0f0;
      --text-muted: #888;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .offline-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--yellow);
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--text); }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.95); opacity: 0.7; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text);
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--yellow);
      color: var(--dark);
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .retry-btn:hover {
      background: #e6a800;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,193,7,0.3);
    }

    .retry-btn:active { transform: translateY(0); }

    .status-bar {
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(255,193,7,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="brand">Optima<span>Biz</span></div>
    <span class="offline-icon">📡</span>
    <h1>Kamu sedang offline</h1>
    <p>Koneksi internet tidak tersedia. Periksa Wi-Fi atau data selulermu, lalu coba lagi.</p>
    <button class="retry-btn" onclick="location.reload()">🔄 Coba Lagi</button>
    <div class="status-bar">
      💡 Data produk tersimpan secara lokal — tetap aman meskipun offline.
    </div>
  </div>
</body>
</html>
